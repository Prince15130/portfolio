<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // Redirect to index.html with the requested path preserved
      var path = window.location.pathname;
      // If path includes /portfolio, extract everything after it
      if (path.includes('/portfolio/')) {
        path = path.split('/portfolio')[1];
      }
      // Redirect to index.html with the path hash
      window.location.replace('/portfolio/#' + path);
    </script>
  </head>
  <body></body>
</html>
